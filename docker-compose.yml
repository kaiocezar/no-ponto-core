  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app

  # ── Celery Beat (comentado — iniciar manualmente em dev) ─────────────────────
  # celery_beat:
  #   build: .
  #   container_name: agendador_celery_beat
  #   command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=config.settings.development
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

